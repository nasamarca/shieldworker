[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Allow Deploy.s.sol to write `deployments/fuji-<chainId>.json` via vm.writeJson
fs_permissions = [{ access = "read-write", path = "./deployments" }]
solc_version = "0.8.34"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
fuji = "${FUJI_RPC_URL}"

[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }
